<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking - Hotel Management</title>
  <link rel="stylesheet" href="style.css"> <!-- reusing existing CSS -->
</head>
<body>

  <header>
   <nav class="navbar">
    <h1 class="logo">LuxeLodge</h1>
    <ul class="nav-links">
      <li><a href="index.html"><b>Home</b></a></li>
      <li><a href="rooms.html"><b>Rooms</b></a></li>
      <li><a href="contact.html"><b>Contact</b></a></li>
    </ul>
  </nav>
   <h1><b>Book a Room</b></h1>
  </header>

  <main>
    <div class="booking-form">
    <form action="#" method="post">
      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" required><br>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required><br>

      <label for="room">Room Type:</label>
      <select id="room" name="room">
        <option>Standard</option>
        <option>Deluxe</option>
        <option>Suite</option>
      </select><br>

      <label for="checkin">Check-in Date:</label>
      <input type="date" id="checkin" name="checkin" required><br>

      <label for="checkout">Check-out Date:</label>
      <input type="date" id="checkout" name="checkout" required><br>

      <button type="submit">Book Now</button>
    </form>
    </div>
  </main>
  <script>
    document.querySelector("form").addEventListener("submit", function(event) {
      event.preventDefault(); // Prevent form from actually submitting
      alert("✅ Booking confirmed! Thank you for booking!.");
    });
  </script>
</body>
</html>
